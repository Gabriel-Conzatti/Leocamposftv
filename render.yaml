# Render Blueprint - Deploy automático
# Frontend (Vite/React) vai no Vercel
# Backend (Node.js/Express) vai no Render

services:
  # Backend API
  - type: web
    name: futevolei-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npm run db:migrate:prod && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: futevolei-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        sync: false

databases:
  - name: futevolei-db
    databaseName: futevolei
    plan: free
    region: oregon
