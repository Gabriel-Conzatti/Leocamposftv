# Render Blueprint - Deploy automático
# Frontend + Backend + PostgreSQL - Tudo no Render

services:
  # Frontend (Static Site)
  - type: web
    name: futevolei-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: futevolei-api
          envVarKey: RENDER_EXTERNAL_URL

  # Backend API
  - type: web
    name: futevolei-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npm run db:migrate:prod && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: futevolei-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        fromService:
          type: web
          name: futevolei-frontend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: futevolei-db
    databaseName: futevolei
    plan: free
    region: oregon
